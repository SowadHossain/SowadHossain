<svg xmlns="http://www.w3.org/2000/svg" width="450" height="207" viewBox="0 0 450 207">
    <style>
      @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes barGrow { from { transform: scaleX(0); } to { transform: scaleX(1); } }
      text { font-family: 'Segoe UI', Ubuntu, 'Helvetica Neue', sans-serif; }
    </style>
    
    <defs>
      <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#7C3AED"/>
        <stop offset="100%" stop-color="#22D3EE"/>
      </linearGradient>
      <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#0D1117"/>
        <stop offset="100%" stop-color="#161B22"/>
      </linearGradient>
      <filter id="glow">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    
    <rect width="450" height="207" rx="12" fill="url(#bgGrad)" stroke="rgba(139,92,246,0.3)" stroke-width="1"/>
    <rect width="450" height="207" rx="12" fill="none" stroke="url(#accentGrad)" stroke-width="0.5" opacity="0.4"/>

    <g opacity="0" style="animation: fadeIn 0.6s ease 0s forwards">
      <text x="30" y="38" font-size="18" font-weight="700" fill="#FFFFFF">Most Used Languages</text>
      <rect x="30" y="48" width="60" height="3" rx="1.5" fill="url(#accentGrad)"/>
    </g>

    <!-- Progress Bar -->
    <g opacity="0" style="animation: fadeIn 0.6s ease 0.15s forwards">
      <rect x="30" y="55" width="390" height="8" rx="4" fill="#0D1117"/>
      <clipPath id="barClip"><rect x="30" y="55" width="390" height="8" rx="4"/></clipPath>
      <g clip-path="url(#barClip)" style="transform-origin: 30px center; animation: barGrow 1s ease 0.3s both">
        <rect x="30" y="55" width="104.52" height="8" rx="4" fill="#dea584"/><rect x="134.51999999999998" y="55" width="95.94" height="8" rx="4" fill="#4F5D95"/><rect x="230.45999999999998" y="55" width="75.27" height="8" rx="4" fill="#3178c6"/><rect x="305.72999999999996" y="55" width="50.7" height="8" rx="4" fill="#f1e05a"/><rect x="356.42999999999995" y="55" width="26.52" height="8" rx="4" fill="#e34c26"/><rect x="382.94999999999993" y="55" width="18.33" height="8" rx="4" fill="#555555"/><rect x="401.2799999999999" y="55" width="9.36" height="8" rx="4" fill="#199f4b"/><rect x="410.63999999999993" y="55" width="9.36" height="8" rx="4" fill="#b07219"/>
      </g>
    </g>

