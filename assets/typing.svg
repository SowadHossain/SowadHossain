<svg xmlns="http://www.w3.org/2000/svg" width="650" height="50" viewBox="0 0 650 50">
    <style>
      @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
    
        <text x="325" y="32" text-anchor="middle" font-size="22" font-weight="500"
          fill="#7C3AED" font-family="'Fira Code', 'Cascadia Code', monospace"
          opacity="0">
          Full-Stack Developer
          <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.00;0.02;0.23;0.25;1" dur="16s" repeatCount="indefinite"/>
        </text>
        <text x="325" y="32" text-anchor="middle" font-size="22" font-weight="500"
          fill="#7C3AED" font-family="'Fira Code', 'Cascadia Code', monospace"
          opacity="0">
          SaaS & Dashboard Builder
          <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.25;0.27;0.48;0.50;1" dur="16s" repeatCount="indefinite"/>
        </text>
        <text x="325" y="32" text-anchor="middle" font-size="22" font-weight="500"
          fill="#7C3AED" font-family="'Fira Code', 'Cascadia Code', monospace"
          opacity="0">
          Automation Enthusiast
          <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.50;0.52;0.73;0.75;1" dur="16s" repeatCount="indefinite"/>
        </text>
        <text x="325" y="32" text-anchor="middle" font-size="22" font-weight="500"
          fill="#7C3AED" font-family="'Fira Code', 'Cascadia Code', monospace"
          opacity="0">
          Minimalist UX | Max Impact
          <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.75;0.77;0.98;1.00;1" dur="16s" repeatCount="indefinite"/>
        </text>
    <!-- Cursor -->
    <rect x="520" y="12" width="2" height="26" rx="1" fill="#7C3AED" style="animation: blink 0.8s step-end infinite"/>
    </svg>