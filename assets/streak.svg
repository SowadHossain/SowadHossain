<svg xmlns="http://www.w3.org/2000/svg" width="450" height="200" viewBox="0 0 450 200">
    <style>
      @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
      @keyframes ringDraw { from { stroke-dashoffset: 251; } to { stroke-dashoffset: 0; } }
      text { font-family: 'Segoe UI', Ubuntu, 'Helvetica Neue', sans-serif; }
    </style>
    
    <defs>
      <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#7C3AED"/>
        <stop offset="100%" stop-color="#22D3EE"/>
      </linearGradient>
      <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#0D1117"/>
        <stop offset="100%" stop-color="#161B22"/>
      </linearGradient>
      <filter id="glow">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    
    <rect width="450" height="200" rx="12" fill="url(#bgGrad)" stroke="rgba(139,92,246,0.3)" stroke-width="1"/>
    <rect width="450" height="200" rx="12" fill="none" stroke="url(#accentGrad)" stroke-width="0.5" opacity="0.4"/>

    <!-- Total Contributions -->
    <g opacity="0" style="animation: fadeIn 0.6s ease 0.1s forwards">
      <text x="83" y="75" font-size="28" font-weight="700" fill="#22D3EE" text-anchor="middle">661</text>
      <text x="83" y="100" font-size="11" font-weight="500" fill="#8B949E" text-anchor="middle">Total Contributions</text>
      <text x="83" y="118" font-size="10" fill="#8B949E" text-anchor="middle">Past Year</text>
    </g>

    <!-- Divider -->
    <line x1="165" y1="40" x2="165" y2="165" stroke="#8B949E" stroke-width="0.5" opacity="0.3"/>

    <!-- Current Streak -->
    <g opacity="0" style="animation: fadeIn 0.6s ease 0.3s forwards">
      <circle cx="262" cy="80" r="40" fill="none" stroke="#7C3AED" stroke-width="3" opacity="0.2"/>
      <circle cx="262" cy="80" r="40" fill="none" stroke="#22D3EE" stroke-width="3"
        stroke-dasharray="251" stroke-dashoffset="251" stroke-linecap="round"
        style="animation: ringDraw 1.5s ease 0.5s forwards"/>
      <text x="262" y="76" font-size="28" font-weight="700" fill="#FFFFFF" text-anchor="middle"
        dominant-baseline="middle" style="animation: pulse 2s ease-in-out infinite">0</text>
      <text x="262" y="135" font-size="12" font-weight="600" fill="#7C3AED" text-anchor="middle">Current Streak</text>
      <text x="262" y="152" font-size="10" fill="#8B949E" text-anchor="middle"> - Present</text>
    </g>

    <!-- Divider -->
    <line x1="345" y1="40" x2="345" y2="165" stroke="#8B949E" stroke-width="0.5" opacity="0.3"/>

    <!-- Longest Streak -->
    <g opacity="0" style="animation: fadeIn 0.6s ease 0.5s forwards">
      <text x="397" y="75" font-size="28" font-weight="700" fill="#7C3AED" text-anchor="middle">60</text>
      <text x="397" y="100" font-size="11" font-weight="500" fill="#8B949E" text-anchor="middle">Longest Streak</text>
      <text x="397" y="118" font-size="10" fill="#8B949E" text-anchor="middle">Jan 31 - Mar 31</text>
    </g>

    <!-- Fire icon -->
    <text x="262" y="25" font-size="18" text-anchor="middle" filter="url(#glow)">🔥</text>
    </svg>